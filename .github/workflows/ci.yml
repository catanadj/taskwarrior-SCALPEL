name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  hygiene:
    runs-on: ubuntu-latest
    env:
      TZ: UTC
      SCALPEL_TZ: UTC
      SCALPEL_DISPLAY_TZ: local

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d # v5.1.0
        with:
          python-version: "3.11"

      - name: Snapshot Hygiene Gate
        run: ./scripts/scalpel_ci_hygiene.sh

  quality:
    runs-on: ubuntu-latest
    env:
      TZ: UTC
      SCALPEL_TZ: UTC
      SCALPEL_DISPLAY_TZ: local

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d # v5.1.0
        with:
          python-version: "3.11"

      - name: Install Dev Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Strict Gate
        run: ./scripts/scalpel_ci.sh --strict --format

      - name: Coverage Gate
        env:
          # Coverage tracing invalidates the dedicated wall-clock performance budget.
          SCALPEL_SKIP_PERF_TESTS: "1"
        run: |
          PYTHON="$(command -v python)" python -m coverage run -m unittest discover -s tests
          python -m coverage combine
          python -m coverage report

      - name: Frontend Syntax Gate
        run: python -m scalpel.tools.check_frontend --require-node

  compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d # v5.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Package
        run: pip install -e .

      - name: Contract Suite
        run: python -m unittest discover -s tests

  browser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d # v5.1.0
        with:
          python-version: "3.11"

      - name: Install Package
        run: pip install -e .

      - name: Expose Hosted Chromium
        run: sudo ln -s "$(command -v google-chrome)" /usr/local/bin/chromium

      - name: Browser Contracts Without Skips
        run: |
          python scripts/run_tests.py --fail-on-skip --pattern 'test_contract_serve_browser_live.py'
          python scripts/run_tests.py --fail-on-skip --pattern 'test_contract_serve_end_to_end.py'

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d # v5.1.0
        with:
          python-version: "3.11"

      - name: Install Dev Dependencies
        run: pip install -e ".[dev]"

      - name: Static Security Scan
        run: bandit -c pyproject.toml --severity-level high -r scalpel

      - name: Dependency Audit
        run: pip-audit .
