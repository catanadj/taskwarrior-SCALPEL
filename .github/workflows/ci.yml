name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    env:
      TZ: UTC
      SCALPEL_TZ: UTC
      SCALPEL_DISPLAY_TZ: local

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d # v5.1.0
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type Check
        run: python -m mypy --config-file pyproject.toml

      - name: Compile
        run: python -m compileall -q scalpel

      - name: Run Contract Suite
        run: python -m unittest discover -s tests -p 'test_contract_*.py'
